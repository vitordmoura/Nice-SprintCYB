name: Terraform Validate — NICE

on:
  push:
    paths:
      - 'infra/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'infra/**'
  workflow_dispatch: {}

jobs:
  terraform:
    name: Terraform Init & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Verificar formatação (terraform fmt)
        run: terraform fmt -check -recursive
        continue-on-error: true
        # Não bloqueia o pipeline — apenas reporta divergências de estilo

      - name: Terraform Init (sem backend remoto)
        # -backend=false: não tenta conectar no S3/DynamoDB (sem credenciais AWS)
        # Suficiente para validar sintaxe, tipos e referências entre recursos
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Resultado
        run: echo "✅ Terraform validado com sucesso — main.tf está sintaticamente correto e consistente."
