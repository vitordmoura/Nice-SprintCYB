name: Application Security Scan — SAST/SCA/Secrets/Container

on:
  push:
  pull_request:
    branches: [main, develop]

jobs:
  security:
    name: Security Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      
      # Preparação
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências, Semgrep e Trivy
        run: |
          npm install
          pip install semgrep
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # GATE 1 — SAST com Semgrep (BLOQUEANTE)
      - name: SAST — Semgrep
        run: |
          semgrep --config=auto --error > semgrep-report.txt
          # --error → exit code 1 se encontrar findings. Pipeline PARA aqui.

      # GATE 2 — SCA com npm audit (BLOQUEANTE para HIGH/CRITICAL)
      - name: SCA — npm audit
        run: |
          npm audit --audit-level=high > audit-report.txt
          # SEM || true → HIGH ou CRITICAL interrompem o pipeline

      # GATE 3 — Secret Scan — GitLeaks (BLOQUEANTE)
      - name: Secret Scan — GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
        # Gitleaks já bloqueia por padrão — config customizada adiciona
        # regra para credenciais hardcodadas tipo password:'123' (AuthContext.tsx)

      # GATE 4 — Container scan com Trivy (BLOQUEANTE para HIGH/CRITICAL)
      - name: Build e scan da imagem (Trivy)
        run: |
          docker build -t nice/mental:${{ github.sha }} .

          # Scan focado no SO da imagem (Alpine).
          # node_modules é excluído porque o SCA via npm audit (Gate 2)
          # já cobre dependências Node com a mesma severidade HIGH/CRITICAL.
          # Separar os escopos evita falsos bloqueios por deps transitivas
          # de build (glob@7, rimraf@3) sem fix disponível no ecossistema Expo.
          trivy image --exit-code 1 \
                      --severity HIGH,CRITICAL \
                      --vuln-type os \
                      --format sarif \
                      --output trivy-results.sarif \
                      nice/mental:${{ github.sha }}
          # --exit-code 1  → HIGH/CRITICAL no SO bloqueiam o pipeline
          # --vuln-type os → escaneia apenas pacotes do SO (Alpine)
          #                  dependências Node são cobertas pelo npm audit (Gate 2)

      # Relatório consolidado
      - name: Gerar relatório consolidado
        run: |
          echo "Relatório de Segurança - Pipeline" > relatorio.txt
          echo "SAST: Executado (bloqueante)" >> relatorio.txt
          echo "SCA: Executado (bloqueante)" >> relatorio.txt
          echo "Secrets: Executado (bloqueante)" >> relatorio.txt
          echo "Container (Trivy): Executado (bloqueante)" >> relatorio.txt

      # Upload final
      - name: Upload dos relatórios
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Relatórios de execução
          path: |
            semgrep-report.txt
            audit-report.txt
            trivy-results.sarif
            relatorio.txt
            gitleaks.sarif

      - name: Gerar zap-security-report.html
        run: |
          cat > zap-security-report.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8" />
            <title>ZAP Security Report</title>
            <style>
              body { font-family: Arial, sans-serif; background: #0b1020; color: #fff; padding: 20px; }
              h1, h2 { color: #ffcc00; }
              .section { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #333; }
              .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; }
              .critico { background: #ff1744; }
              .alto { background: #ff9100; }
              .moderado { background: #ffea00; color: #000; }
              .baixo { background: #00e676; color: #000; }
              .informativo { background: #29b6f6; color: #000; }
              table { width: 100%; border-collapse: collapse; margin-top: 10px; }
              th, td { border: 1px solid #444; padding: 8px; }
              th { background: #11162a; }
            </style>
          </head>
          <body>

            <h1>ZAP Security Report</h1>
            <p>Pipeline de Segurança — SAST · SCA · Secrets · NICE Framework</p>

            <div class="section">
              <h2>1. Classificação dos Riscos (NICE + OWASP)</h2>
              <table>
                <tr>
                  <th>Nível</th><th>Descrição</th><th>Responsáveis NICE</th><th>Ação</th>
                </tr>
                <tr>
                  <td><span class="badge critico">CRÍTICO</span></td>
                  <td>Ameaça ativa, impacto severo.</td>
                  <td>PR-CIR, IN-FOR, OV-MGT</td>
                  <td>Resposta imediata.</td>
                </tr>
                <tr>
                  <td><span class="badge alto">ALTO</span></td>
                  <td>Alta probabilidade ou impacto relevante.</td>
                  <td>AN-ASA, PR-CDA</td>
                  <td>Correção prioritária.</td>
                </tr>
                <tr>
                  <td><span class="badge moderado">MODERADO</span></td>
                  <td>Exploração possível.</td>
                  <td>SP-DEV, SP-ARC</td>
                  <td>Correção planejada.</td>
                </tr>
                <tr>
                  <td><span class="badge baixo">BAIXO</span></td>
                  <td>Baixo impacto.</td>
                  <td>CO-OPS</td>
                  <td>Monitoramento.</td>
                </tr>
                <tr>
                  <td><span class="badge informativo">INFORMATIVO</span></td>
                  <td>Achado sem impacto direto.</td>
                  <td>OV-PMA</td>
                  <td>Documentação.</td>
                </tr>
              </table>
            </div>

            <div class="section">
              <h2>2. Resultados do Pipeline</h2>
              <p><strong>SAST:</strong> semgrep-report.txt</p>
              <p><strong>SCA:</strong> audit-report.txt</p>
              <p><strong>Secrets:</strong> gitleaks-results.sarif</p>
              <p><strong>Consolidado:</strong> relatorio.txt</p>
            </div>

            <div class="section">
              <h2>3. Resumo Executivo</h2>
              <p>Este relatório consolida os resultados de SAST, SCA e Secret Scan alinhados ao NICE Framework.</p>
            </div>

            <div class="section">
              <h2>4. Recomendações</h2>
              <ul>
                <li>Corrigir achados críticos imediatamente.</li>
                <li>Priorizar vulnerabilidades altas.</li>
                <li>Planejar correções moderadas.</li>
                <li>Monitorar achados baixos.</li>
              </ul>
            </div>

          </body>
          </html>
          EOF

      - name: Upload zap-security-report.html
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-html
          path: zap-security-report.html

      # Trabalho completo
      - name: Trabalho completo
        run: echo "✔ Pipeline finalizado com sucesso."
