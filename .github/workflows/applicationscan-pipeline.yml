name: 🔐 Application Security Scan — SAST/SCA/Secrets
on:
  push:
  pull_request:

jobs:
  security:
    name: Security Pipeline
    runs-on: ubuntu-latest

    steps:

      # Preparação
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências e Semgrep
        run: |
          npm install
          pip install semgrep

      # SAST / SCA
      - name: Executar SAST e SCA
        run: |
          semgrep --config=auto --error > semgrep-report.txt
          npm audit --audit-level=high > audit-report.txt || true

      # Secret Scan — GitLeaks
      - name: Executar Secret Scan (GitLeaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --report-format=json --report-path=gitleaks-report.json

      - name: Converter relatório GitLeaks para TXT
        run: |
          cat gitleaks-report.json > gitleaks-report.txt

      # Relatório consolidado
      - name: Gerar relatório consolidado
        run: |
          echo "Relatório de Segurança - Pipeline" > relatorio.txt
          echo "SAST: Executado" >> relatorio.txt
          echo "SCA: Executado" >> relatorio.txt
          echo "Secrets: Executado" >> relatorio.txt

      # Organização dos artefatos
      - name: Organizar artefatos em pastas
        run: |
          mkdir -p "Relatórios de execução/txt"

          mv semgrep-report.txt "Relatórios de execução/txt/"
          mv audit-report.txt "Relatórios de execução/txt/"
          mv gitleaks-report.txt "Relatórios de execução/txt/"
          mv relatorio.txt "Relatórios de execução/txt/"

      # Upload final
      - name: Upload dos relatórios
        uses: actions/upload-artifact@v4
        with:
          name: Relatórios de execução
          path: "Relatórios de execução/"

      # Trabalho completo
      - name: Trabalho completo
        run: echo "✔ Pipeline finalizado com sucesso."
